<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘神谕 · 灵感选牌</title>
    <style>
        :root {
            --gold: #c5a059;
            --bg: #0a0a0c;
            /* 调整卡牌比例为标准的 1:1.75 */
            --card-w: 80px; 
            --card-h: 140px;
        }

        body {
            background-color: var(--bg);
            color: #e0e0e0;
            font-family: "STKaiti", "KaiTi", serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        h1 { color: var(--gold); font-weight: 300; letter-spacing: 5px; margin-top: 30px; transition: 0.5s; z-index: 10; }

        .table {
            position: relative;
            width: 100vw;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        /* --- 卡牌核心样式 --- */
        .card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            user-select: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid var(--gold);
            border-radius: 8px; /* 圆角增加精致感 */
            backface-visibility: hidden;
            overflow: hidden; /* 关键：确保内部图片裁切 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 自动裁切图片的通用规则 */
        .card-face img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 关键：自动裁切并填充，不变形 */
            display: block;
        }

        /* 背面层 */
        .card-back {
            background: #1a1a20;
            z-index: 2;
        }

        /* 正面层 */
        .card-front {
            background: #000;
            transform: rotateY(180deg);
            z-index: 1;
        }

        /* 悬停微动 */
        .card:hover:not(.selected) {
            margin-top: -30px;
            filter: brightness(1.3);
            z-index: 100 !important;
        }

        /* 选中并翻牌的特效 */
        .card.selected {
            z-index: 500 !important;
            transform: translate(0, -100px) rotateY(180deg) scale(2.8) !important;
            left: calc(50% - var(--card-w)/2) !important;
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.4);
        }

        /* 洗牌动画 */
        .shuffling { animation: shuffle-anim 0.12s infinite; }
        @keyframes shuffle-anim {
            0% { transform: translate(0,0); }
            50% { transform: translate(8px, 3px) rotate(1deg); }
            100% { transform: translate(-8px, -3px) rotate(-1deg); }
        }

        /* --- 结果显示 --- */
        #result-box {
            position: fixed;
            bottom: 40px;
            text-align: center;
            width: 100%;
            opacity: 0;
            transition: 1s ease-out;
            pointer-events: none;
            z-index: 1000;
        }

        .verdict { font-size: 2.8rem; font-weight: bold; margin: 5px 0; letter-spacing: 12px; }
        .yes { color: #4ade80; text-shadow: 0 0 15px rgba(74,222,128,0.3); } 
        .no { color: #f87171; text-shadow: 0 0 15px rgba(248,113,113,0.3); } 
        .maybe { color: var(--gold); }

        button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 45px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background: var(--gold); color: #000; }
        
        #hint { color: var(--gold); margin-top: 10px; min-height: 24px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1 id="title">神 谕 · 是 非 占</h1>
    <div id="hint">静心冥想，准备开启仪式</div>

    <div class="table" id="table">
        </div>

    <div id="result-box">
        <div id="card-name" style="color:var(--gold); letter-spacing: 3px;"></div>
        <div id="verdict-text" class="verdict"></div>
        <p id="desc-text" style="color:#bbb; max-width: 450px; margin: 10px auto; line-height: 1.6;"></p>
        <button onclick="location.reload()">再卜一事</button>
        <p style="color:#444; font-size: 12px; margin-top: 15px;">一事一占 · 忌反复杂念</p>
    </div>

    <button id="start-btn" onclick="initRitual()">开始洗牌</button>

<script>
    const data = [
        { name: "愚者", res: "是", info: "纯粹的开始，放手去做即可。" },
        { name: "魔术师", res: "是", info: "你拥有成功所需的所有工具。" },
        { name: "女祭司", res: "不确定", info: "真相尚未完全显露，静待直觉。" },
        { name: "皇后", res: "是", info: "这是一个丰收且充满创造力的结果。" },
        { name: "皇帝", res: "是", info: "理性的结构将带来你想要的结果。" },
        { name: "教皇", res: "是", info: "遵循传统或共识，结果是肯定的。" },
        { name: "恋人", res: "是", info: "这是一个正确的结合或选择。" },
        { name: "战车", res: "是", info: "保持意志力，必将获得胜利。" },
        { name: "力量", res: "是", info: "以柔克刚，你有能力掌控局面。" },
        { name: "隐士", res: "否", info: "目前应退后反思，不宜向外求结果。" },
        { name: "命运之轮", res: "是", info: "好运转轮正在向你倾斜。" },
        { name: "正义", res: "不确定", info: "因果均衡，取决于你过往的公正性。" },
        { name: "倒吊人", res: "否", info: "需要改变视角，目前行动将被搁置。" },
        { name: "死神", res: "否", info: "此路已断，必须迎接新的转变。" },
        { name: "节制", res: "是", info: "平衡与耐心会带来积极的结果。" },
        { name: "恶魔", res: "否", info: "受困于欲望或执念，结果并不健康。" },
        { name: "高塔", res: "否", info: "突如其来的崩塌，不建议继续推进。" },
        { name: "星星", res: "是", info: "充满希望，愿望终将达成。" },
        { name: "月亮", res: "否", info: "迷雾重重，真相尚未显现。" },
        { name: "太阳", res: "是", info: "最直接的肯定，充满光明与成功。" },
        { name: "审判", res: "是", info: "重要的决定时刻，答案是清晰的。" },
        { name: "世界", res: "是", info: "圆满的终点，目标已达成。" }
    ];

    const table = document.getElementById('table');
    const startBtn = document.getElementById('start-btn');
    const hint = document.getElementById('hint');
    let cards = [];

    // 初始化22张牌，加入背面图 back.png
    function createDeck() {
        for (let i = 0; i < 22; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-face card-back">
                    <img src="back.png" alt="Tarot Back" onerror="this.parentNode.innerHTML='<div style=padding-top:50px;>TAROT</div>'">
                </div>
                <div class="card-face card-front"></div>
            `;
            card.style.left = `calc(50% - 40px)`;
            card.style.top = `150px`;
            table.appendChild(card);
            cards.push(card);
        }
    }

    async function initRitual() {
        startBtn.style.display = 'none';
        hint.innerText = "正在洗牌，注入能量...";
        
        cards.forEach(c => c.classList.add('shuffling'));
        await new Promise(r => setTimeout(r, 1500));
        cards.forEach(c => c.classList.remove('shuffling'));

        hint.innerText = "请凭灵感抽取一张";
        const radius = 420;
        const angleStep = 9; // 稍微收窄一点，适合更多屏幕
        const startAngle = -94.5; 

        cards.forEach((card, i) => {
            const angle = startAngle + (i * angleStep);
            const rad = angle * Math.PI / 180;
            const x = Math.sin(rad) * radius * 0.85;
            const y = (1 - Math.cos(rad)) * radius * 0.25;
            
            card.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
            card.style.zIndex = i;
            card.onclick = () => selectCard(card);
        });
    }

    function selectCard(selectedCard) {
        cards.forEach(c => c.onclick = null);
        selectedCard.classList.add('selected');
        hint.style.opacity = '0';
        document.getElementById('title').style.opacity = '0.2';

        // 随机逻辑
        const result = data[Math.floor(Math.random() * data.length)];
        const imgIndex = data.indexOf(result);

        const front = selectedCard.querySelector('.card-front');
        front.innerHTML = `<img src="${imgIndex}.png" alt="${result.name}" onerror="this.parentNode.innerHTML='<div style=padding-top:50px;>${result.name}</div>'">`;

        setTimeout(() => {
            const resBox = document.getElementById('result-box');
            document.getElementById('card-name').innerText = `《 ${result.name} 》`;
            document.getElementById('verdict-text').innerText = result.res;
            document.getElementById('verdict-text').className = 'verdict ' + (result.res === '是' ? 'yes' : (result.res === '否' ? 'no' : 'maybe'));
            document.getElementById('desc-text').innerText = result.info;
            resBox.style.opacity = '1';
            resBox.style.pointerEvents = 'auto';
        }, 1000);
    }

    createDeck();
</script>
</body>
</html>
